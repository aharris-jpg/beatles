<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #ffffff; font-family: system-ui, sans-serif; }
  figure {
    display: block;
    border-top: 4px solid transparent;
    border-image: linear-gradient(to right, #1E2433, #F5A623) 1;
  }
  figure img {
    display: block;
    width: 100%;
    height: 360px;
    object-fit: cover;
  }
  figcaption {
    background: #1E2433;
    color: #a8a29e;
    font-size: 12px;
    padding: 10px 16px;
    line-height: 1.5;
  }
</style>
</head>
<body>
<figure>
  <img
    src="https://images.unsplash.com/photo-1552601825-e74444da8935?q=80&w=1548&auto=format&fit=crop"
    alt="Beatles album art and music culture, illustrating the band's ongoing presence in American music search behavior"
  >
  <figcaption>
    "Here Comes The Sun" is the most searched Beatles track in 43 of 50 states &bull; Photo: Unsplash (photo-1552601825-e74444da8935)
  </figcaption>
</figure>
</body>
</html>
